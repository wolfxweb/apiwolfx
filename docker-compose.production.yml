version: '3.8'

services:
  # API FastAPI
  api:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "
        apt-get update && 
        apt-get install -y git gcc default-libmysqlclient-dev pkg-config curl unzip openssh-client &&
        rm -rf /tmp/cel /app/* /app/.[!.]* /app/..?* 2>/dev/null || true &&
        GIT_SSH_COMMAND='ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' git clone git@github.com:wolfxweb/apiwolfx.git /tmp/cel &&
        cp -r /tmp/cel/. /app/ &&
        rm -rf /tmp/cel &&
        cd /app &&
        if [ ! -f requirements.txt ]; then echo 'ERROR: requirements.txt not found!' && ls -la /app/ | head -20 && exit 1; fi &&
        pip install --no-cache-dir -r requirements.txt &&
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    volumes:
      - /root/.ssh:/root/.ssh:ro
    environment:
      # Database
      - DATABASE_URL=postgresql://api_user:%40Wolfx20202025@207.231.108.38:5432/selvez

      
      # Mercado Livre API
      - ML_APP_ID=63963006174181
      - ML_CLIENT_SECRET=SWOjuUL7k5dsAna4wrKrDMQzFjbMzk0n
      - ML_REDIRECT_URI=https://www.selvez.com.br/api/callback
      - ML_NOTIFICATION_URL=https://www.selvez.com.br/api/notifications
      
      # Mercado Pago API
      - MP_ACCESS_TOKEN=APP_USR-6987936494418444-101415-df063090488cd09fd99bb0e75ba91dc5-534913383560219
      - MP_PUBLIC_KEY=APP_USR-a77d3ee7-7c94-443e-b910-d4e0c3e41e63
      - MP_WEBHOOK_SECRET=7c315606ea2ebac4cb8410755f6bd42af5f8d7d5af0e5bcdcb1d4b5440068bb2
      - MP_WEBHOOK_URL=https://www.selvez.com.br/api/payments/webhooks/mercadopago
      - MP_SUCCESS_URL=https://www.selvez.com.br/payment/success
      - MP_FAILURE_URL=https://www.selvez.com.br/payment/failure
      - MP_PENDING_URL=https://www.selvez.com.br/payment/pending
      
      # Asaas API (Pagamentos Recorrentes)
      # API Key de produção: https://www.asaas.com → Configurações → Integrações → API
      - ASAAS_API_KEY=${ASAAS_API_KEY}
      # Token do Webhook (opcional, fornecido pelo Asaas)
      - ASAAS_WEBHOOK_TOKEN=${ASAAS_WEBHOOK_TOKEN}
      # URL do Webhook - Configure no painel Asaas: Configurações → Webhooks
      - ASAAS_WEBHOOK_URL=https://www.selvez.com.br/api/asaas/webhooks
      
      # Application
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=False
      - ENVIRONMENT=production
      - DOMAIN=www.selvez.com.br
      
      # Security
      - SECRET_KEY=x9k2mP8vL3nR7qT5wY1jH6fD4sA0bN9cE8gU2iO7lK3mQ6rT1wZ5yX8h
      - ALLOWED_HOSTS=www.selvez.com.br,selvez.com.br
      
      # OpenAI API
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      
    networks:
      - server
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        # Traefik labels para proxy reverso e SSL (Swarm mode)
        - "traefik.enable=true"
        - "traefik.docker.network=server"
        - "traefik.http.routers.selvez-api.rule=Host(`www.selvez.com.br`) || Host(`selvez.com.br`)"
        - "traefik.http.routers.selvez-api.entrypoints=websecure"
        - "traefik.http.routers.selvez-api.tls=true"
        - "traefik.http.routers.selvez-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.selvez-api.service=selvez-api"
        - "traefik.http.services.selvez-api.loadbalancer.server.port=8000"
        - "traefik.http.services.selvez-api.loadbalancer.passHostHeader=true"
        # Redirect HTTP to HTTPS
        - "traefik.http.routers.selvez-api-http.rule=Host(`www.selvez.com.br`) || Host(`selvez.com.br`)"
        - "traefik.http.routers.selvez-api-http.entrypoints=web"
        - "traefik.http.routers.selvez-api-http.middlewares=redirect-to-https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

networks:
  server:
    external: true

