{% extends "superadmin/base.html" %}

{% block title %}Tickets de Suporte - SuperAdmin{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- Header Padrão do Sistema -->
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2"><i class="bi bi-ticket-perforated"></i> Tickets de Suporte</h1>
    </div>

    <!-- Filtros -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label for="statusFilter" class="form-label">Status</label>
                    <select class="form-select form-select-sm" id="statusFilter" onchange="loadTickets()">
                        <option value="">Todos</option>
                        <option value="open">Abertos</option>
                        <option value="in_progress">Em Andamento</option>
                        <option value="waiting_user">Aguardando Resposta</option>
                        <option value="resolved">Resolvidos</option>
                        <option value="closed">Fechados</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="companyFilter" class="form-label">Empresa</label>
                    <select class="form-select form-select-sm" id="companyFilter" onchange="loadTickets()">
                        <option value="">Todas</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="searchInput" class="form-label">Buscar</label>
                    <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Buscar por assunto, ID..." onkeyup="handleSearch()">
                </div>
            </div>
        </div>
    </div>

    <!-- Lista de Tickets -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover" id="ticketsTable">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Empresa</th>
                            <th>Assunto</th>
                            <th>Usuário</th>
                            <th>Categoria</th>
                            <th>Prioridade</th>
                            <th>Status</th>
                            <th>Data de Criação</th>
                            <th>Mensagens</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="ticketsContainer">
                        <tr>
                            <td colspan="10" class="text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Carregando...</span>
                                </div>
                                <p class="mt-2 text-muted">Carregando tickets...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let tickets = [];
let companies = [];
let searchTimeout;

// Carregar empresas para o filtro
async function loadCompanies() {
    try {
        const response = await fetch('/api/superadmin/companies', {
            method: 'GET',
            credentials: 'include'
        });
        
        const data = await response.json();
        
        if (data.success && data.companies) {
            companies = data.companies;
            const companyFilter = document.getElementById('companyFilter');
            
            companies.forEach(company => {
                const option = document.createElement('option');
                option.value = company.id;
                option.textContent = company.name || company.nome_fantasia || `Empresa #${company.id}`;
                companyFilter.appendChild(option);
            });
        }
    } catch (error) {
        console.error('Erro ao carregar empresas:', error);
    }
}

// Carregar tickets
async function loadTickets() {
    const status = document.getElementById('statusFilter')?.value || '';
    const companyId = document.getElementById('companyFilter')?.value || '';
    
    const params = new URLSearchParams();
    if (status) params.append('status', status);
    if (companyId) params.append('company_id', companyId);
    
    const url = `/api/superadmin/support/tickets${params.toString() ? '?' + params.toString() : ''}`;
    
    try {
        const response = await fetch(url, {
            method: 'GET',
            credentials: 'include'
        });
        
        const data = await response.json();
        
        if (data.success) {
            tickets = data.tickets || [];
            renderTickets();
        } else {
            showError('Erro ao carregar tickets: ' + (data.error || 'Erro desconhecido'));
        }
    } catch (error) {
        console.error('Erro ao carregar tickets:', error);
        showError('Erro ao carregar tickets');
    }
}

// Renderizar tickets
function renderTickets() {
    const container = document.getElementById('ticketsContainer');
    
    if (tickets.length === 0) {
        container.innerHTML = `
            <tr>
                <td colspan="10" class="text-center py-5">
                    <i class="bi bi-inbox display-1 text-muted"></i>
                    <h5 class="mt-3">Nenhum ticket encontrado</h5>
                </td>
            </tr>
        `;
        return;
    }
    
    let html = '';
    tickets.forEach(ticket => {
        const statusBadge = getStatusBadge(ticket.status);
        const priorityBadge = getPriorityBadge(ticket.priority);
        const createdAt = formatDate(ticket.created_at);
        
        html += `
            <tr>
                <td>#${ticket.id}</td>
                <td>${escapeHtml(ticket.company_name || 'N/A')}</td>
                <td>${escapeHtml(ticket.subject || 'N/A')}</td>
                <td>${escapeHtml(ticket.user_name || 'N/A')}</td>
                <td>${escapeHtml(ticket.category || '-')}</td>
                <td>${priorityBadge}</td>
                <td>${statusBadge}</td>
                <td>${createdAt}</td>
                <td><span class="badge bg-info">${ticket.message_count || 0}</span></td>
                <td>
                    <a href="/superadmin/support/tickets/${ticket.id}" class="btn btn-sm btn-outline-primary" title="Ver ticket">
                        <i class="bi bi-eye"></i>
                    </a>
                </td>
            </tr>
        `;
    });
    
    container.innerHTML = html;
}

// Função de busca
function handleSearch() {
    clearTimeout(searchTimeout);
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    
    searchTimeout = setTimeout(() => {
        if (!searchTerm) {
            renderTickets();
            return;
        }
        
        const filteredTickets = tickets.filter(ticket => {
            return (
                ticket.id.toString().includes(searchTerm) ||
                (ticket.subject && ticket.subject.toLowerCase().includes(searchTerm)) ||
                (ticket.company_name && ticket.company_name.toLowerCase().includes(searchTerm)) ||
                (ticket.user_name && ticket.user_name.toLowerCase().includes(searchTerm))
            );
        });
        
        const container = document.getElementById('ticketsContainer');
        if (filteredTickets.length === 0) {
            container.innerHTML = `
                <tr>
                    <td colspan="10" class="text-center py-5">
                        <i class="bi bi-search"></i> Nenhum ticket encontrado para "${searchTerm}"
                    </td>
                </tr>
            `;
            return;
        }
        
        let html = '';
        filteredTickets.forEach(ticket => {
            const statusBadge = getStatusBadge(ticket.status);
            const priorityBadge = getPriorityBadge(ticket.priority);
            const createdAt = formatDate(ticket.created_at);
            
            html += `
                <tr>
                    <td>#${ticket.id}</td>
                    <td>${escapeHtml(ticket.company_name || 'N/A')}</td>
                    <td>${escapeHtml(ticket.subject || 'N/A')}</td>
                    <td>${escapeHtml(ticket.user_name || 'N/A')}</td>
                    <td>${escapeHtml(ticket.category || '-')}</td>
                    <td>${priorityBadge}</td>
                    <td>${statusBadge}</td>
                    <td>${createdAt}</td>
                    <td><span class="badge bg-info">${ticket.message_count || 0}</span></td>
                    <td>
                        <a href="/superadmin/support/tickets/${ticket.id}" class="btn btn-sm btn-outline-primary" title="Ver ticket">
                            <i class="bi bi-eye"></i>
                        </a>
                    </td>
                </tr>
            `;
        });
        
        container.innerHTML = html;
    }, 300);
}

// Funções auxiliares
function getStatusBadge(status) {
    const badges = {
        'open': '<span class="badge bg-warning">Aberto</span>',
        'in_progress': '<span class="badge bg-info">Em Andamento</span>',
        'waiting_user': '<span class="badge bg-secondary">Aguardando</span>',
        'resolved': '<span class="badge bg-success">Resolvido</span>',
        'closed': '<span class="badge bg-dark">Fechado</span>'
    };
    return badges[status] || `<span class="badge bg-secondary">${status}</span>`;
}

function getPriorityBadge(priority) {
    const badges = {
        'low': '<span class="badge bg-secondary">Baixa</span>',
        'medium': '<span class="badge bg-primary">Média</span>',
        'high': '<span class="badge bg-warning">Alta</span>',
        'urgent': '<span class="badge bg-danger">Urgente</span>'
    };
    return badges[priority] || `<span class="badge bg-secondary">${priority}</span>`;
}

function formatDate(dateString) {
    if (!dateString) return 'N/A';
    const date = new Date(dateString);
    return date.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showError(message) {
    // Criar toast de erro
    const toastContainer = document.getElementById('toast-container') || createToastContainer();
    const toast = document.createElement('div');
    toast.className = 'toast align-items-center text-white bg-danger border-0';
    toast.setAttribute('role', 'alert');
    toast.innerHTML = `
        <div class="d-flex">
            <div class="toast-body">${escapeHtml(message)}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    `;
    toastContainer.appendChild(toast);
    const bsToast = new bootstrap.Toast(toast);
    bsToast.show();
}

function createToastContainer() {
    const container = document.createElement('div');
    container.id = 'toast-container';
    container.className = 'toast-container position-fixed top-0 end-0 p-3';
    container.style.zIndex = '9999';
    document.body.appendChild(container);
    return container;
}

// Inicialização
document.addEventListener('DOMContentLoaded', () => {
    loadCompanies();
    loadTickets();
});
</script>
{% endblock %}
